<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蚀骨香</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #faf8f5; --fg: #2c2c2c; --muted: #6b6b6b; --accent: #8b3a3a;
    --accent-light: #c27b7b; --border: #e0dcd6; --card: #ffffff;
    --toc-bg: #f5f2ed; --shadow: rgba(0,0,0,0.06);
    --font-body: "Noto Serif SC", "Source Han Serif SC", "思源宋体", "STSong", "SimSun", Georgia, serif;
    --font-ui: "Noto Sans SC", "Source Han Sans SC", "Microsoft YaHei", sans-serif;
    --line: 1.9; --max-width: 720px; --radius: 8px;
}
:root.dark {
    --bg: #1a1a1a; --fg: #d4d4d4; --muted: #888888; --accent: #c27b7b;
    --accent-light: #e0a0a0; --border: #3a3a3a; --card: #252525;
    --toc-bg: #222222; --shadow: rgba(0,0,0,0.3);
}
html { scroll-behavior: smooth; }
body {
    font-family: var(--font-body); background: var(--bg); color: var(--fg);
    line-height: var(--line); font-size: 18px;
    transition: background 0.3s, color 0.3s; overflow-x: hidden;
}
.container { display: flex; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
.sidebar {
    width: 280px; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh;
    background: var(--toc-bg); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 100;
    transition: background 0.3s, transform 0.3s;
}
.sidebar-header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); }
.sidebar-title { font-family: var(--font-ui); font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.sidebar-subtitle { font-size: 0.75rem; color: var(--muted); font-family: var(--font-ui); }
.back-home {
    display: block; padding: 8px 20px; color: var(--accent); text-decoration: none;
    font-size: 0.85rem; font-family: var(--font-ui); font-weight: 600;
    border-bottom: 1px solid var(--border); transition: background 0.2s;
}
.back-home:hover { background: var(--bg); }
.toc-wrap { flex: 1; overflow-y: auto; padding: 12px 0; }
.toc-wrap::-webkit-scrollbar { width: 4px; }
.toc-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.toc-link {
    display: block; padding: 6px 20px; color: var(--muted); text-decoration: none;
    font-size: 0.85rem; font-family: var(--font-ui); line-height: 1.5;
    border-left: 3px solid transparent; transition: all 0.2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.toc-link:hover, .toc-link.active { color: var(--accent); background: var(--bg); border-left-color: var(--accent); }
.toc-level-1 { font-weight: 700; font-size: 0.95rem; color: var(--fg); }
.toc-level-2 { font-size: 0.88rem; }
.toc-level-3 { font-size: 0.82rem; padding-left: 28px !important; }
.sidebar-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; }
.main { margin-left: 280px; flex: 1; padding: 60px 40px 80px; max-width: var(--max-width); min-width: 0; }
article { background: var(--card); padding: 48px 56px; border-radius: var(--radius); box-shadow: 0 2px 20px var(--shadow); }
article h1 { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.6em; color: var(--accent); text-align: center; font-family: var(--font-ui); }
article h2 { font-size: 1.5rem; font-weight: 700; margin-top: 2em; margin-bottom: 0.8em; padding-bottom: 0.3em; border-bottom: 2px solid var(--accent-light); color: var(--accent); font-family: var(--font-ui); }
article h3 { font-size: 1.25rem; font-weight: 700; margin-top: 1.6em; margin-bottom: 0.6em; color: var(--fg); font-family: var(--font-ui); }
article p { margin-bottom: 1.2em; text-align: justify; text-indent: 2em; }
article p:first-of-type { text-indent: 0; }
article blockquote { margin: 1.5em 0; padding: 1em 1.4em; border-left: 4px solid var(--accent-light); background: var(--toc-bg); border-radius: 0 var(--radius) var(--radius) 0; color: var(--muted); font-style: italic; }
article blockquote p { text-indent: 0; margin-bottom: 0.5em; }
article blockquote p:last-child { margin-bottom: 0; }
article hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
article strong { color: var(--accent); font-weight: 700; }
article em { font-style: italic; color: var(--accent-light); }
article ul, article ol { margin: 1em 0 1em 2em; }
article li { margin-bottom: 0.5em; }
article a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent-light); transition: border 0.2s; }
article a:hover { border-bottom-style: solid; }
.btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; color: var(--muted); font-family: var(--font-ui); font-size: 0.8rem; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.progress-bar { position: fixed; top: 0; left: 280px; right: 0; height: 3px; background: var(--border); z-index: 200; }
.progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent-light), var(--accent)); width: 0%; transition: width 0.1s; }
.back-to-top { position: fixed; bottom: 30px; right: 30px; width: 44px; height: 44px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transform: translateY(10px); transition: all 0.3s; box-shadow: 0 2px 10px var(--shadow); z-index: 200; font-size: 1.2rem; }
.back-to-top.visible { opacity: 1; transform: translateY(0); }
.back-to-top:hover { background: var(--accent); color: white; border-color: var(--accent); }
.menu-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 300; width: 40px; height: 40px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 10px var(--shadow); font-size: 1.2rem; color: var(--fg); }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
.overlay.show { display: block; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }
::selection { background: var(--accent-light); color: white; }
@media (max-width: 900px) {
    .menu-toggle { display: flex; }
    .sidebar { transform: translateX(-100%); box-shadow: 2px 0 20px rgba(0,0,0,0.15); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; padding: 60px 20px 40px; }
    article { padding: 28px 24px; }
    .progress-bar { left: 0; }
    .back-to-top { bottom: 20px; right: 20px; }
}
@media (max-width: 600px) {
    body { font-size: 16px; }
    article h1 { font-size: 1.8rem; }
    article h2 { font-size: 1.3rem; }
    article h3 { font-size: 1.1rem; }
    .main { padding: 50px 14px 30px; }
    article { padding: 22px 18px; }
}
</style>
</head>
<body>
<div class="progress-bar"><div class="progress-bar-inner" id="progress"></div></div>
<button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">蚀骨香</div>
            <div class="sidebar-subtitle">目录导航</div>
        </div>
        <a href="index.html" class="back-home">← 返回书库</a>
        <div class="toc-wrap" id="tocWrap">
            
        </div>
        <div class="sidebar-footer">
            <button class="btn" onclick="toggleTheme()" id="themeBtn">
                <span id="themeIcon">🌙</span> <span id="themeText">暗色</span>
            </button>
        </div>
    </aside>
    <main class="main">
        <article>
            
        </article>
    </main>
</div>
<button class="back-to-top" id="backToTop" onclick="window.scrollTo(0,0)">↑</button>
<script>
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');
const themeText = document.getElementById('themeText');
function loadTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'dark') {
        html.classList.add('dark');
        themeIcon.textContent = '☀';
        themeText.textContent = '亮色';
    }
}
function toggleTheme() {
    html.classList.toggle('dark');
    const isDark = html.classList.contains('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    themeIcon.textContent = isDark ? '☀' : '🌙';
    themeText.textContent = isDark ? '亮色' : '暗色';
}
function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('overlay').classList.toggle('show');
}
const progress = document.getElementById('progress');
window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    progress.style.width = pct + '%';
    const backToTop = document.getElementById('backToTop');
    backToTop.classList.toggle('visible', scrollTop > 300);
});
const headings = document.querySelectorAll('article h1, article h2, article h3');
const tocLinks = document.querySelectorAll('.toc-link');
function updateActiveTOC() {
    let current = '';
    for (const h of headings) {
        if (h.getBoundingClientRect().top <= 100) {
            current = h.id;
        }
    }
    tocLinks.forEach(link => {
        link.classList.toggle('active', link.getAttribute('href') === '#' + current);
        if (link.getAttribute('href') === '#' + current) {
            link.scrollIntoView({block: 'nearest', behavior: 'smooth'});
        }
    });
}
window.addEventListener('scroll', () => requestAnimationFrame(updateActiveTOC));
window.addEventListener('hashchange', () => {
    const el = document.getElementById(location.hash.slice(1));
    if (el) {
        const y = el.getBoundingClientRect().top + window.scrollY - 20;
        window.scrollTo(0, y);
    }
});
loadTheme();
updateActiveTOC();
</script>
</body>
</html>
